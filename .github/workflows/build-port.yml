name: Build FNF Web Port

on:
  workflow_dispatch:
    inputs:
      mod_url:
        description: 'Direct URL to your mod .zip file (Google Drive, Dropbox, MediaFire, etc.)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Engine source ────────────────────────────────────────────────────
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: 'ShadowMario/FNF-PsychEngine'
          path: 'engine-source'

      # ── 2. Mod download & injection ─────────────────────────────────────────
      - name: Download Mod
        run: |
          pip install gdown --quiet
          URL="${{ github.event.inputs.mod_url }}"
          if [[ "$URL" == *"drive.google.com"* ]]; then
            gdown "$URL" -O mod-payload.zip
          else
            wget -q -O mod-payload.zip "$URL"
          fi
          mkdir -p mods_upload
          unzip -q mod-payload.zip -d mods_upload/
          rm mod-payload.zip

      # Place the mod into example_mods/<Name>/, which PsychEngine bakes into
      # the runtime mods/ folder. We do NOT flatten into assets/shared anymore —
      # the engine's own mod loader (enabled for HTML5 in the Patch step) reads
      # mods/ via the FileSystem->openfl.Assets stubs. This generalizes to any
      # well-formed Psych mod regardless of zip layout.
      - name: Inject Mod
        run: |
          set -e
          echo "=== mods_upload tree (depth 6) ===" && find mods_upload -maxdepth 6 -type d | head -120

          ENGINE_MODS="engine-source/example_mods"
          # Drop PsychEngine's bundled example mods so only the user's mod loads.
          rm -rf "$ENGINE_MODS"
          mkdir -p "$ENGINE_MODS"

          # Folder names that are mod-internal asset categories, never mod roots.
          RESERVED="characters songs stages weeks data images music sounds scripts videos fonts achievements custom_events custom_notetypes shaders states substates"
          is_reserved() { local n="${1,,}"; for r in $RESERVED; do [ "$n" = "$r" ] && return 0; done; return 1; }

          declare -a MODFOLDERS

          # Strategy 1: zip contains a 'mods' directory -> each non-reserved child is a mod.
          while IFS= read -r modsdir; do
            for child in "$modsdir"/*/; do
              [ -d "$child" ] || continue
              is_reserved "$(basename "$child")" && continue
              MODFOLDERS+=("${child%/}")
            done
          done < <(find mods_upload -type d -name mods)

          # Strategy 2: no mods/ dir -> a folder containing pack.json is a mod root.
          if [ ${#MODFOLDERS[@]} -eq 0 ]; then
            while IFS= read -r pj; do
              MODFOLDERS+=("$(dirname "$pj")")
            done < <(find mods_upload -name pack.json -not -path '*/images/*')
          fi

          # Strategy 3: still nothing -> the dir holding weeks/ or data/ (not inside
          # images/) is treated as a single mod root.
          if [ ${#MODFOLDERS[@]} -eq 0 ]; then
            root=$(find mods_upload -type d \( -name weeks -o -name data \) \
              | grep -v '/images/' | sed 's|/[^/]*$||' | sort -u | head -1)
            [ -n "$root" ] && MODFOLDERS+=("$root")
          fi

          if [ ${#MODFOLDERS[@]} -eq 0 ]; then
            echo "ERROR: could not locate any mod content in zip" && exit 1
          fi

          # De-duplicate.
          mapfile -t MODFOLDERS < <(printf '%s\n' "${MODFOLDERS[@]}" | sort -u)

          # Copy each detected mod into example_mods/<Name> and enable it in list.txt.
          : > engine-source/list.txt
          for mf in "${MODFOLDERS[@]}"; do
            name="$(basename "$mf")"
            echo "Mod: '$mf' -> mods/$name"
            mkdir -p "$ENGINE_MODS/$name"
            cp -r "$mf/." "$ENGINE_MODS/$name/"
            printf '%s|1\n' "$name" >> engine-source/list.txt
          done

          echo "=== example_mods (baked to mods/) ===" && ls -la "$ENGINE_MODS"
          for d in "$ENGINE_MODS"/*/; do
            echo "--- $d ---" && ls "$d"
          done
          echo "=== list.txt (-> modsList.txt) ===" && cat engine-source/list.txt

      - name: Disable Videos
        run: find . -name "*.mp4" -type f -exec mv {} {}.disabled \;

      # ── 3. Toolchain ────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Haxe 4.3.6
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Install Haxelibs
        working-directory: engine-source
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 8.1.2 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib install flixel 5.6.1 --quiet
          haxelib install flixel-addons 3.2.2 --quiet
          haxelib install flixel-tools 1.5.1 --quiet
          haxelib install hscript-iris 1.1.3 --quiet
          haxelib install tjson 1.4.0 --quiet
          haxelib install hxvlc 2.0.1 --skip-dependencies --quiet
          haxelib set lime 8.1.2
          haxelib set openfl 9.3.3
          haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate 768740a56b26aa0c072720e0d1236b94afe68e3e
          find ~/haxelib/flxanimate -name "*.hx" | xargs perl -i -pe 's/(\w[\w.]*)\s*\?\?\s*(\w[\w.]*)/($1 != null ? $1 : $2)/g'
          haxelib git funkin.vis https://github.com/FunkinCrew/funkVis 22b1ce089dd924f15cdc4632397ef3504d464e90
          haxelib git grig.audio https://gitlab.com/haxe-grig/grig.audio.git cbf91e2180fd2e374924fe74844086aab7891666

      # ── 4. HTML5 compatibility patches ──────────────────────────────────────
      #
      # PsychEngine targets desktop (cpp) by default. Compiling for HTML5/JS
      # requires three categories of fixes:
      #
      #  A) sys.* package — Haxe HTML5 target blocks it at the compiler level,
      #     so we can't import or shadow it. We delete all import sys.* lines
      #     and replace usages with Hx-prefixed stub classes that have no
      #     conflict with browser built-ins (js.html.File, js.html.FileSystem).
      #     Thread/Mutex/FixedThreadPool also get bare-name stubs because the
      #     engine uses those names directly after the import is removed.
      #
      #  B) js.html.* wildcard — import.hx pulls in 'import js.html.*' for JS
      #     builds, which makes bare names like File, FileSystem, and Option
      #     resolve to browser types instead of engine types. We fix each:
      #       • File / FileSystem  → replaced by sed with HxFile / HxFileSystem
      #       • options.Option     → explicit import injected (beats wildcard)
      #       • haxe.io.Path       → typedef stub; avoids double-substitution
      #
      #  C) cpp / lua / discord — native-only libraries stripped from Project.xml
      #     and replaced with no-op stubs so the codebase compiles cleanly.
      #
      - name: Patch for HTML5
        run: |
          cd engine-source

          # ── A: sys.* stubs ──────────────────────────────────────────────────
          # HxFileSystem and HxFile delegate to openfl.utils.Assets so baked-in
          # mod assets (mods/ embedded via Project.xml) are discoverable at runtime
          printf 'class HxFileSystem {\n  public static function absolutePath(p:String) return p;\n  public static function fullPath(p:String) return p;\n  static function _norm(p:String):String { var n = p.split("\\\\").join("/"); if (!StringTools.endsWith(n, "/")) n += "/"; return n; }\n  public static function exists(p:String):Bool {\n    if (openfl.utils.Assets.exists(p)) return true;\n    var norm = _norm(p);\n    for (a in openfl.utils.Assets.list()) { if (StringTools.startsWith(a, norm)) return true; }\n    return false;\n  }\n  public static function readDirectory(p:String):Array<String> {\n    var norm = _norm(p);\n    var seen = new haxe.ds.StringMap<Bool>();\n    var result:Array<String> = [];\n    for (a in openfl.utils.Assets.list()) {\n      if (StringTools.startsWith(a, norm)) {\n        var rest = a.substr(norm.length);\n        var part = rest.split("/")[0];\n        if (part != "" && !seen.exists(part)) { seen.set(part, true); result.push(part); }\n      }\n    }\n    return result;\n  }\n  public static function isDirectory(p:String):Bool {\n    if (openfl.utils.Assets.exists(p)) return false;\n    var norm = _norm(p);\n    for (a in openfl.utils.Assets.list()) { if (StringTools.startsWith(a, norm)) return true; }\n    return false;\n  }\n  public static function stat(p:String) return null;\n  public static function createDirectory(p:String) {}\n  public static function deleteFile(p:String) {}\n  public static function deleteDirectory(p:String) {}\n}\n' > source/HxFileSystem.hx
          printf 'class HxFile {\n  public static function getContent(p:String):String {\n    try { var t = openfl.utils.Assets.getText(p); return t != null ? t : ""; } catch(e:Dynamic) { return ""; }\n  }\n  public static function getBytes(p:String):haxe.io.Bytes {\n    try { return openfl.utils.Assets.getBytes(p); } catch(e:Dynamic) { return null; }\n  }\n  public static function saveContent(p:String, c:String) {}\n  public static function saveBytes(p:String, b:Dynamic) {}\n  public static function copy(s:String, d:String) {}\n}\n' > source/HxFile.hx
          printf 'class HxProcess {\n  public var stdout:Dynamic;\n  public var stderr:Dynamic;\n  public function new(c:String, ?a:Dynamic) { stdout = { readAll: function() return { toString:function() return "", readLine:function() return "" } }; stderr = stdout; }\n  public function exitCode(b:Bool=true) return 0;\n  public function close() {}\n}\n' > source/HxProcess.hx
          printf 'class HxThread { public static function create(f:Void->Void) { f(); } public static function readMessage(b:Bool) return null; public static function sendMessage(m:Dynamic) {} }\n' > source/HxThread.hx
          printf 'class Thread { public static function create(f:Void->Void) { f(); } public static function readMessage(b:Bool) return null; public static function sendMessage(m:Dynamic) {} }\n' > source/Thread.hx
          printf 'class HxMutex { public function new() {} public function acquire() {} public function release() {} }\n' > source/HxMutex.hx
          printf 'class Mutex { public function new() {} public function acquire() {} public function release() {} }\n' > source/Mutex.hx
          printf 'class HxFixedThreadPool { public function new(size:Int) {} public function run(f:Void->Void) { f(); } public function shutdown() {} }\n' > source/HxFixedThreadPool.hx
          printf 'class FixedThreadPool { public function new(size:Int) {} public function run(f:Void->Void) { f(); } public function shutdown() {} }\n' > source/FixedThreadPool.hx
          printf 'class Sys {\n  public static function exit(code:Int) {}\n  public static function sleep(t:Float) {}\n  public static function command(c:String, ?a:Array<String>) return 0;\n  public static function args():Array<String> return [];\n  public static function getCwd() return "";\n  public static function setCwd(s:String) {}\n  public static function print(v:Dynamic) {}\n  public static function println(v:Dynamic) {}\n  public static function environment() return new haxe.ds.StringMap<String>();\n  public static function getEnv(s:String) return "";\n  public static function programPath() return "";\n}\n' > source/Sys.hx

          # ── B: js.html.* conflict fixes ─────────────────────────────────────
          printf 'typedef Path = haxe.io.Path;\n' > source/Path.hx
          grep -rl "new Option(" source --include="*.hx" \
            | grep -v "source/options/Option.hx" \
            | xargs -r sed -i '/^package /a import options.Option;'

          # ── C: discord / lua / cpp stubs ────────────────────────────────────
          sed -i -e '/discord_rpc/d' -e '/discord-rpc/d' -e '/linc_luajit/d' -e '/DISCORD_ALLOWED/d' Project.xml || true

          # ── C2: enable the mod system on HTML5 ──────────────────────────────
          # Flips MODS_ALLOWED + HSCRIPT_ALLOWED from desktop-only to always-on,
          # turns the example_mods folder into a real (non-template) asset so
          # openfl.Assets can see the injected mod, and stops excluding .ogg on
          # web so mod audio embeds. Script is base64'd to avoid YAML quoting.
          echo '' | base64 -d > /tmp/projpatch.py
          python3 /tmp/projpatch.py
          mkdir -p source/hxdiscord_rpc
          printf 'package hxdiscord_rpc;\nclass Discord { public static function Initialize(a:String,b:Bool,c:Dynamic){} public static function Shutdown(){} public static function RunCallbacks(){} public static function UpdatePresence(a:Dynamic){} public static function ClearPresence(){} }\n' > source/hxdiscord_rpc/Discord.hx
          printf 'package hxdiscord_rpc;\nclass Types { public static inline var DISCORD_REPLY_NO=0; public static inline var DISCORD_REPLY_YES=1; public static inline var DISCORD_REPLY_IGNORE=2; }\n' > source/hxdiscord_rpc/Types.hx
          printf 'package hxdiscord_rpc;\ntypedef DiscordPresence = Dynamic;\n' > source/hxdiscord_rpc/DiscordPresence.hx
          printf 'package hxdiscord_rpc;\ntypedef DiscordRichPresence = Dynamic;\n' > source/hxdiscord_rpc/DiscordRichPresence.hx
          printf 'package backend;\nclass DiscordClient {\n  public static var isInitialized:Bool = false;\n  public static function initialize() {}\n  public static function shutdown() {}\n  public static function prepare() {}\n  public static function check() {}\n  public static function resetClientID(?id:String) {}\n  public static function changePresence(details:String, ?state:String, ?smallImageKey:String, ?hasStartTimestamp:Bool, ?endTimestamp:Float) {}\n}\n' > source/backend/Discord.hx

          # ── Bulk source sed ──────────────────────────────────────────────────
          find source -name "*.hx" -type f -exec sed -i \
            -e '/import sys\./d' \
            -e 's/sys\.FileSystem/HxFileSystem/g' \
            -e 's/sys\.io\.File/HxFile/g' \
            -e 's/sys\.io\.Process/HxProcess/g' \
            -e 's/sys\.thread\.Thread/HxThread/g' \
            -e 's/sys\.thread\.Mutex/HxMutex/g' \
            -e 's/sys\.thread\.FixedThreadPool/HxFixedThreadPool/g' \
            -e 's/\bFile\./HxFile./g' \
            -e 's/\bFileSystem\./HxFileSystem./g' \
            -e '/import cpp/d' \
            -e 's/cpp\.vm\.Gc\.memInfo64(cpp\.vm\.Gc\.MEM_INFO_USAGE)/0/g' \
            -e 's/cpp\.[a-zA-Z0-9_]*/Dynamic/g' \
            -e '/import llua/d' \
            -e 's/llua\.[a-zA-Z0-9_]*/Dynamic/g' \
            -e 's/getCPUThreadsCount()/1/g' \
            -e 's/FlxG\.error(/trace(/g' \
            {} +

          # weekBefore may be absent in older mod week JSONs — null-guard it
          find source -name "StoryMenuState.hx" -exec perl -i \
            -pe 's/leWeek\.weekBefore\.length/leWeek.weekBefore != null \&\& leWeek.weekBefore.length/g' {} +
          # Also null-guard leWeek itself in case a weeksList entry has no matching JSON
          find source -name "StoryMenuState.hx" -exec perl -i \
            -pe 's/function weekIsLocked\(name:String\):Bool \{/function weekIsLocked(name:String):Bool { var _lw = WeekData.weeksLoaded.get(name); if (_lw == null) return false;/g' {} +
          # Null-guard weekFile before pushing (weeksLoaded.get returns null for missing keys)
          sed -i 's/if(!isLocked || !weekFile\.hiddenUntilUnlocked)/if(weekFile != null \&\& (!isLocked || !weekFile.hiddenUntilUnlocked))/g' \
            source/states/StoryMenuState.hx
          # Null-guard weekCharacters (absent in older mod week JSONs)
          sed -i 's/loadedWeeks\[0\]\.weekCharacters;/(loadedWeeks[0].weekCharacters != null ? loadedWeeks[0].weekCharacters : []);/g' \
            source/states/StoryMenuState.hx
          # updateText(): null-guard weekCharacters and songs arrays
          sed -i 's/var weekArray:Array<String> = loadedWeeks\[curWeek\]\.weekCharacters;/var weekArray:Array<String> = (loadedWeeks[curWeek].weekCharacters != null ? loadedWeeks[curWeek].weekCharacters : []);/g' \
            source/states/StoryMenuState.hx
          sed -i 's/for (i in 0...leWeek\.songs\.length) {/for (i in 0...(leWeek.songs != null ? leWeek.songs.length : 0)) {/g' \
            source/states/StoryMenuState.hx
          sed -i 's/stringThing\.push(leWeek\.songs\[i\]\[0\]);/stringThing.push(leWeek.songs[i] != null ? leWeek.songs[i][0] : "");/g' \
            source/states/StoryMenuState.hx
          # grpWeekCharacters changeCharacter: guard weekArray index
          sed -i 's/grpWeekCharacters\.members\[i\]\.changeCharacter(weekArray\[i\]);/grpWeekCharacters.members[i].changeCharacter(i < weekArray.length \&\& weekArray[i] != null ? weekArray[i] : "");/g' \
            source/states/StoryMenuState.hx
          # selectWeek(): null-guard songs array before .length
          sed -i 's/var leWeek:Array<Dynamic> = loadedWeeks\[curWeek\]\.songs;/var leWeek:Array<Dynamic> = (loadedWeeks[curWeek].songs != null ? loadedWeeks[curWeek].songs : []);/g' \
            source/states/StoryMenuState.hx

          # FlxSoundTray needs stub methods added before its constructor
          find . -name "FlxSoundTray.hx" -type f -exec sed -i \
            's/public function new(/public function showIncrement() { show(); } public function showDecrement() { show(); }\n\n&/g' {} +

      # ── 5. Build ────────────────────────────────────────────────────────────
      - name: Build HTML5
        run: |
          cd engine-source
          # NO_PRELOAD_ALL is intentionally omitted: PsychEngine reads mod JSON/txt
          # synchronously via openfl.Assets.getText, which only works for preloaded
          # assets on HTML5. Without preload the mod data reads back empty.
          haxelib run lime build html5 -release -D DISCORD_DISABLE

      # ── 6. Package & publish ─────────────────────────────────────────────────
      - name: Package
        run: |
          cd engine-source/export/release/html5/bin
          MAIN_JS=$(ls *.js | grep -Ev 'howler|pako' | head -n 1)
          if [ -n "$MAIN_JS" ] && [ "$MAIN_JS" != "funkin.js" ]; then
            mv "$MAIN_JS" funkin.js
            [ -f index.html ] && sed -i "s/$MAIN_JS/funkin.js/g" index.html
          fi
          [ ! -f index.html ] && printf '<!DOCTYPE html><html><body><script src="funkin.js"></script></body></html>' > index.html
          zip -r ../../../../../web_export.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web_export.zip

      - name: Publish to web-build Branch
        run: |
          cd engine-source/export/release/html5/bin
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Web Port Build"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:web-build
