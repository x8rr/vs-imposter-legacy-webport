name: Build FNF Web Port

on:
  workflow_dispatch:
    inputs:
      mod_url:
        description: 'Direct URL to your mod .zip file (Google Drive, Dropbox, MediaFire, etc.)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Engine source ────────────────────────────────────────────────────
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          repository: 'ShadowMario/FNF-PsychEngine'
          path: 'engine-source'

      # ── 2. Mod download & injection ─────────────────────────────────────────
      - name: Download Mod
        run: |
          pip install gdown --quiet
          URL="${{ github.event.inputs.mod_url }}"
          if [[ "$URL" == *"drive.google.com"* ]]; then
            gdown "$URL" -O mod-payload.zip
          else
            wget -q -O mod-payload.zip "$URL"
          fi
          mkdir -p mods_upload
          unzip -q mod-payload.zip -d mods_upload/
          rm mod-payload.zip

      - name: Inject Mod
        run: |
          mkdir -p engine-source/mods
          cp -rn mods_upload/* engine-source/mods/ || true
          cp -rn mods_upload/* engine-source/assets/ || true

      - name: Disable Videos
        run: find . -name "*.mp4" -type f -exec mv {} {}.disabled \;

      # ── 3. Toolchain ────────────────────────────────────────────────────────
      - name: Setup Haxe 4.2.5
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Haxelibs
        working-directory: engine-source
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 8.1.2 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib install flixel 5.6.1 --quiet
          haxelib install flixel-addons 3.2.2 --quiet
          haxelib install flixel-tools 1.5.1 --quiet
          haxelib install hscript-iris 1.1.3 --quiet
          haxelib install tjson 1.4.0 --quiet
          haxelib install hxvlc 2.0.1 --skip-dependencies --quiet
          haxelib set lime 8.1.2
          haxelib set openfl 9.3.3
          haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate 768740a56b26aa0c072720e0d1236b94afe68e3e
          haxelib git funkin.vis https://github.com/FunkinCrew/funkVis 22b1ce089dd924f15cdc4632397ef3504d464e90
          haxelib git grig.audio https://gitlab.com/haxe-grig/grig.audio.git cbf91e2180fd2e374924fe74844086aab7891666

      # ── 4. HTML5 compatibility patches ──────────────────────────────────────
      #
      # PsychEngine targets desktop (cpp) by default. Compiling for HTML5/JS
      # requires three categories of fixes:
      #
      #  A) sys.* package — Haxe HTML5 target blocks it at the compiler level,
      #     so we can't import or shadow it. We delete all import sys.* lines
      #     and replace usages with Hx-prefixed stub classes that have no
      #     conflict with browser built-ins (js.html.File, js.html.FileSystem).
      #     Thread/Mutex/FixedThreadPool also get bare-name stubs because the
      #     engine uses those names directly after the import is removed.
      #
      #  B) js.html.* wildcard — import.hx pulls in 'import js.html.*' for JS
      #     builds, which makes bare names like File, FileSystem, and Option
      #     resolve to browser types instead of engine types. We fix each:
      #       • File / FileSystem  → replaced by sed with HxFile / HxFileSystem
      #       • options.Option     → explicit import injected (beats wildcard)
      #       • haxe.io.Path       → typedef stub; avoids double-substitution
      #
      #  C) cpp / lua / discord — native-only libraries stripped from Project.xml
      #     and replaced with no-op stubs so the codebase compiles cleanly.
      #
      - name: Patch for HTML5
        run: |
          cd engine-source

          # ── sys.* stubs (bare names work fine on Haxe 4.2.5) ────────────────
          echo 'class FileSystem { public static function absolutePath(path:String) return path; public static function exists(path:String) return false; public static function readDirectory(path:String):Array<String> return []; public static function isDirectory(path:String) return false; public static function stat(path:String) return null; public static function fullPath(path:String) return path; public static function createDirectory(path:String) {} public static function deleteFile(path:String) {} public static function deleteDirectory(path:String) {} }' > source/FileSystem.hx
          echo 'class File { public static function getContent(path:String) return ""; public static function getBytes(path:String) return null; public static function saveContent(path:String, c:String) return; public static function saveBytes(path:String, b:Dynamic) return; public static function copy(s:String, d:String) {} }' > source/File.hx
          echo 'class Sys { public static function exit(code:Int) {} public static function sleep(t:Float) {} public static function command(c:String, ?a:Array<String>) return 0; public static function args():Array<String> return []; public static function getCwd() return ""; public static function setCwd(s:String) {} public static function print(v:Dynamic) {} public static function println(v:Dynamic) {} public static function environment() return new haxe.ds.StringMap<String>(); public static function getEnv(s:String) return ""; public static function programPath() return ""; }' > source/Sys.hx
          echo 'class Process { public var stdout:Dynamic; public var stderr:Dynamic; public function new(c:String, ?a:Dynamic) { stdout = { readAll: function() return { toString: function() return "" }, readLine: function() return "" }; stderr = stdout; } public function exitCode(b:Bool=true) return 0; public function close() {} }' > source/Process.hx
          echo 'class Thread { public static function create(f:Void->Void) { f(); } public static function readMessage(b:Bool) return null; public static function sendMessage(m:Dynamic) {} }' > source/Thread.hx
          echo 'class Mutex { public function new() {} public function acquire() {} public function release() {} }' > source/Mutex.hx

          # ── discord / lua stubs ──────────────────────────────────────────────
          sed -i -e '/discord_rpc/d' -e '/discord-rpc/d' -e '/linc_luajit/d' Project.xml || true
          mkdir -p source/hxdiscord_rpc
          echo 'package hxdiscord_rpc; class Discord { public static function Initialize(a:String,b:Bool,c:Dynamic){} public static function Shutdown(){} public static function RunCallbacks(){} public static function UpdatePresence(a:Dynamic){} public static function ClearPresence(){} }' > source/hxdiscord_rpc/Discord.hx
          echo 'package hxdiscord_rpc; class Types { public static inline var DISCORD_REPLY_NO=0; public static inline var DISCORD_REPLY_YES=1; public static inline var DISCORD_REPLY_IGNORE=2; }' > source/hxdiscord_rpc/Types.hx
          echo 'package hxdiscord_rpc; typedef DiscordPresence = Dynamic;' > source/hxdiscord_rpc/DiscordPresence.hx

          # ── Bulk source sed ──────────────────────────────────────────────────
          find source -name "*.hx" -type f -exec sed -i \
            -e 's/sys\.FileSystem/FileSystem/g' \
            -e 's/sys\.io\.File/File/g' \
            -e 's/sys\.io\.Process/Process/g' \
            -e 's/sys\.thread\.Thread/Thread/g' \
            -e 's/sys\.thread\.Mutex/Mutex/g' \
            -e '/import cpp/d' \
            -e 's/cpp\.[a-zA-Z0-9_]*/Dynamic/g' \
            -e '/import llua/d' \
            -e 's/llua\.[a-zA-Z0-9_]*/Dynamic/g' \
            {} +

          # FlxSoundTray needs stub methods added before its constructor
          find . -name "FlxSoundTray.hx" -type f -exec sed -i \
            's/public function new(/public function showIncrement() { show(); } public function showDecrement() { show(); }\n\n&/g' {} +

      # ── 5. Build ────────────────────────────────────────────────────────────
      - name: Build HTML5
        run: |
          cd engine-source
          haxelib run lime build html5 -release -D DISCORD_DISABLE -D NO_PRELOAD_ALL

      # ── 6. Package & publish ─────────────────────────────────────────────────
      - name: Package
        run: |
          cd engine-source/export/release/html5/bin
          MAIN_JS=$(ls *.js | grep -Ev 'howler|pako' | head -n 1)
          if [ -n "$MAIN_JS" ] && [ "$MAIN_JS" != "funkin.js" ]; then
            mv "$MAIN_JS" funkin.js
            [ -f index.html ] && sed -i "s/$MAIN_JS/funkin.js/g" index.html
          fi
          [ ! -f index.html ] && printf '<!DOCTYPE html><html><body><script src="funkin.js"></script></body></html>' > index.html
          zip -r ../../../../../web_export.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web_export.zip

      - name: Publish to web-build Branch
        run: |
          cd engine-source/export/release/html5/bin
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Web Port Build"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:web-build
